# # ~/.config/kitty/kitty.conf

# # Theme
# include theme/theme.conf
# include theme/tokyo_night.conf
# include configs/keybinds.conf

# Theme
include theme/theme.conf
include theme/tokyo_night.conf

# Keybinds
include configs/keybinds.conf

# Core configs
include configs/font.conf
include configs/performance.conf
include configs/window.conf
include configs/scroll.conf
include configs/mouse.conf
include configs/behavior.conf
include configs/layout.conf
include configs/remote.conf
include configs/shell.conf
include configs/misc.conf

# # Fonte
# font_family Maple Mono Regular 12

# # Ajustes de fonte
# adjust_line_height  110%
# adjust_column_width 0

# # Ligatures para melhor código
# disable_ligatures never

# # Opacidade sutil
# background_opacity 0.95
# dynamic_background_opacity yes

# # Sem perguntar se quer fechar a janela
# confirm_os_window_close 0

# # Decorações minimalistas
# hide_window_decorations titlebar-only
# wayland_titlebar_color background

# # Máxima performance
# repaint_delay    3
# input_delay      3
# sync_to_monitor  yes

# # Scroll
# wheel_scroll_multiplier 5.0

# # Scrollback otimizado para logs
# scrollback_lines 2000
# scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
# scrollback_pager_history_size 16
# scrollback_fill_enlarged_window yes

# # Audio desabilitado
# enable_audio_bell no
# visual_bell_duration 0.0

# # Mouse otimizado
# copy_on_select no
# strip_trailing_spaces smart
# select_by_word_characters @-./_~?&=%+#
# click_interval -1.0
# focus_follows_mouse no
# default_pointer_shape beam
# pointer_shape_when_grabbed arrow
# mouse_hide_wait 0.0

# # URLs e links
# detect_urls yes
# open_url_with default

# # Layouts
# enabled_layouts splits,stack,tall,fat,horizontal,vertical

# # Controle remoto para automação
# allow_remote_control yes
# listen_on unix:/tmp/kitty-{kitty_pid}

# # Editor padrão
# editor code

# # Shell integration
# shell_integration enabled

# # Suporte a hyperlinks
# allow_hyperlinks yes

# # Undercurl para editores modernos
# undercurl_style thin-sparse

# # Terminal type
# term xterm-kitty

# # Wayland específico
# linux_display_server auto
# wayland_titlebar_color background

# # Composição de texto
# text_composition_strategy platform