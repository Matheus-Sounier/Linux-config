# ~/.config/sway/config/display.conf

# Wallpaper
output * {
    background ~/Pictures/wallpaper/monika.jpg fill
    resolution 1920x1080
}

# Monitor principal
output HDMI-1 resolution 1920x1080 position 0,0 scale 1

# Adicione outros monitores conforme necessário
# output DP-1 resolution 2560x1440 position 1920,0 scale 1
