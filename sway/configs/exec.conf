# Bar e notify
exec waybar
exec swaync

# Clipboard
exec wl-paste -t text --watch clipman store

# Window block com idle
exec swayidle -w \
    timeout 400 'swaylock -f -c 2e3440' \
    timeout 500 'swaymsg "output * dpms off"' \
    resume 'swaymsg "output * dpms on"' \
    before-sleep 'swaylock -f -c 2e3440'

# Modo sistema (POWER MENU)
set $mode_system Sistema: (l) Lock, (e) Exit, (s) Suspend, (r) Reboot, (p) Power off
mode "$mode_system" {
    bindsym l exec swaylock -f -C ~/.config/swaylock/config, mode "default"
    bindsym e exec swaymsg exit, mode "default"
    bindsym s exec systemctl suspend, mode "default"
    bindsym r exec systemctl reboot, mode "default"
    bindsym p exec systemctl poweroff -i, mode "default"

    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+Shift+q mode "$mode_system"

# Modo de redimensionamento
mode "resize" {
    # Redimensionar com vim keys
    bindsym h resize shrink width 10px
    bindsym j resize grow height 10px
    bindsym k resize shrink height 10px
    bindsym l resize grow width 10px

    # Redimensionar com setas
    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px

    # Sair do modo
    bindsym Return mode "default"
    bindsym Escape mode "default"
    bindsym $mod+r mode "default"
}
bindsym $mod+r mode "resize"

# Teclas de mídia (se disponíveis)
bindsym XF86AudioRaiseVolume exec pamixer -i 5 --allow-boost
bindsym XF86AudioLowerVolume exec pamixer -d 5 --allow-boost
bindsym XF86AudioMute exec pamixer --toggle-mute
bindsym XF86MonBrightnessUp exec brightnessctl set +5%
bindsym XF86MonBrightnessDown exec brightnessctl set 5%-

# Controle de mídia (adicionar se quiser)
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous